name: timbre

services:
  timbre:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: spadav/timbre:cuda
    ports:
      - "9000:9000"
    environment:
      NVIDIA_VISIBLE_DEVICES: ${TIMBRE_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids:
                - ${TIMBRE_NVIDIA_VISIBLE_DEVICES:-all}
              capabilities: [gpu]
    volumes:
      - timbre-data:/root/.config/timbre
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface

volumes:
  timbre-data:
