name: timbre

services:
  timbre:
    build: .
    image: spadav/timbre:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
    volumes:
      - timbre-data:/root/.config/timbre
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface

volumes:
  timbre-data:
